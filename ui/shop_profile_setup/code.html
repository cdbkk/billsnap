<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shop Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-[480px] mx-auto bg-white dark:bg-background-dark shadow-xl overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-gray-100 dark:border-gray-800">
<div class="text-[#111813] dark:text-white flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowBack">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Shop Profile</h2>
</div>
<div class="flex-1 overflow-y-auto pb-32">
<!-- ProfileHeader / Logo Upload Section -->
<div class="flex p-4 @container">
<div class="flex w-full flex-col gap-6 items-center">
<div class="flex gap-4 flex-col items-center">
<!-- Custom Image/Logo Placeholder with dashed border for upload feel -->
<div class="relative group cursor-pointer">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full min-h-32 w-32 border-4 border-dashed border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center bg-gray-50 dark:bg-gray-800" data-alt="Dashed circular area for shop logo upload" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDHzbKozwmxvZBg09hCve6OlstOB1dFmPAkbq1-IZufIWQQBnTp_otvZW9BXVV3QociVPhdftheswuv5X70A-08zHzlgihyqy27NUUUIhHcbYEyDjoZR-xLag2LY97AvyQrURaYBzvCel6YVZTEkjXWABDgh1-MyGR3nTM3O5CSga8JIDzl0_zWTihG06cfbPAvXDrFUjIzjctg_TDQw_xSrTWcih9fcp14CnE4twjGG7eTIaN5zXdqnlbNlFnoTSzO_8DIgoudcOY");'>
<div class="absolute inset-0 bg-black/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-4xl">photo_camera</span>
</div>
</div>
<div class="absolute bottom-1 right-1 bg-primary p-2 rounded-full shadow-lg border-2 border-white dark:border-background-dark">
<span class="material-symbols-outlined text-white text-sm">edit</span>
</div>
</div>
<div class="flex flex-col items-center justify-center">
<h1 class="text-[#111813] dark:text-white text-[24px] font-bold leading-tight tracking-[-0.015em] text-center">Set up your shop</h1>
<p class="text-[#61896f] dark:text-gray-400 text-sm font-normal leading-normal text-center mt-2 px-6">
                                This information will appear on your customer receipts for LINE and Instagram orders.
                            </p>
</div>
</div>
</div>
</div>
<!-- Form Fields -->
<div class="px-4 space-y-2">
<!-- Shop Name TextField -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111813] dark:text-white text-base font-semibold leading-normal pb-2">Shop Name</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111813] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#61896f] p-[15px] text-base font-normal leading-normal" placeholder="e.g., Baan Somtum" value=""/>
</label>
</div>
<!-- Phone Number TextField -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111813] dark:text-white text-base font-semibold leading-normal pb-2">Contact Number</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111813] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#61896f] p-[15px] text-base font-normal leading-normal" placeholder="08X-XXX-XXXX" type="tel" value=""/>
</label>
</div>
<!-- PromptPay ID TextField -->
<div class="flex flex-wrap items-end gap-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<div class="flex justify-between items-center pb-2">
<p class="text-[#111813] dark:text-white text-base font-semibold leading-normal">PromptPay ID</p>
<span class="text-xs text-primary font-medium">Recommended</span>
</div>
<div class="flex w-full flex-1 items-stretch rounded-lg group">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111813] dark:text-white focus:outline-0 focus:ring-0 border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#61896f] p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" placeholder="Citizen ID or Phone Number" value=""/>
<div class="text-[#61896f] dark:text-gray-400 flex border border-[#dbe6df] dark:border-gray-700 bg-white dark:bg-gray-800 items-center justify-center pr-[15px] rounded-r-lg border-l-0" data-icon="Info">
<span class="material-symbols-outlined">help_outline</span>
</div>
</div>
<p class="text-[#61896f] dark:text-gray-400 text-xs mt-2">Allows customers to pay you easily via mobile banking.</p>
</label>
</div>
</div>
</div>
<!-- Sticky Footer Button -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-gray-100 dark:border-gray-800">
<button class="w-full bg-primary hover:bg-opacity-90 text-[#111813] font-bold text-lg py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                Save and Start
            </button>
</div>
</div>
</body></html>

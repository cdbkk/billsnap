<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Receipt - Thai Social Commerce</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#111813] dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-gray-200 dark:border-white/10">
<div class="flex items-center p-4 justify-between max-w-md mx-auto">
<div class="flex size-10 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center">New Receipt</h2>
<div class="flex size-10 items-center justify-end">
<p class="text-[#61896f] dark:text-primary text-sm font-bold tracking-tight cursor-pointer">Reset</p>
</div>
</div>
</header>
<main class="flex-1 max-w-md mx-auto w-full pb-60">
<!-- Customer Section -->
<section class="py-2">
<h3 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-tight px-4 pb-2 pt-4">Customer Details</h3>
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-[#111813] dark:text-gray-300 text-sm font-medium pb-1.5">Customer Name / Order ID</p>
<input class="form-input w-full rounded-xl border border-[#dbe6df] dark:border-white/10 bg-white dark:bg-white/5 focus:ring-2 focus:ring-primary focus:border-primary h-12 px-4 text-base font-normal" placeholder="e.g. Somchai / #LINE-9923" type="text"/>
</label>
</div>
</section>
<!-- Items Section -->
<section class="py-2">
<div class="flex justify-between items-center px-4 pb-2 pt-4">
<h3 class="text-[#111813] dark:text-white text-lg font-bold leading-tight tracking-tight">Items</h3>
<span class="text-xs font-medium bg-primary/20 text-green-700 dark:text-primary px-2 py-1 rounded-full">3 Items</span>
</div>
<!-- Item List -->
<div class="space-y-1">
<!-- Item 1 -->
<div class="flex items-center gap-4 bg-white dark:bg-white/5 mx-4 p-4 rounded-xl border border-gray-100 dark:border-white/5">
<div class="flex items-center justify-center rounded-lg bg-[#f0f4f2] dark:bg-white/10 shrink-0 size-12">
<span class="material-symbols-outlined text-[#111813] dark:text-white">checkroom</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-[#111813] dark:text-white text-base font-semibold line-clamp-1">Linen Shirt (Beige)</p>
<p class="text-[#61896f] dark:text-gray-400 text-sm font-normal">Qty: 1 • ฿450.00</p>
</div>
<div class="shrink-0">
<span class="material-symbols-outlined text-gray-400 hover:text-red-500 cursor-pointer">delete</span>
</div>
</div>
<!-- Item 2 -->
<div class="flex items-center gap-4 bg-white dark:bg-white/5 mx-4 p-4 rounded-xl border border-gray-100 dark:border-white/5">
<div class="flex items-center justify-center rounded-lg bg-[#f0f4f2] dark:bg-white/10 shrink-0 size-12">
<span class="material-symbols-outlined text-[#111813] dark:text-white">shopping_bag</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-[#111813] dark:text-white text-base font-semibold line-clamp-1">Tote Bag Small</p>
<p class="text-[#61896f] dark:text-gray-400 text-sm font-normal">Qty: 2 • ฿220.00</p>
</div>
<div class="shrink-0">
<span class="material-symbols-outlined text-gray-400 hover:text-red-500 cursor-pointer">delete</span>
</div>
</div>
<!-- Item 3 -->
<div class="flex items-center gap-4 bg-white dark:bg-white/5 mx-4 p-4 rounded-xl border border-gray-100 dark:border-white/5">
<div class="flex items-center justify-center rounded-lg bg-[#f0f4f2] dark:bg-white/10 shrink-0 size-12">
<span class="material-symbols-outlined text-[#111813] dark:text-white">apparel</span>
</div>
<div class="flex flex-col flex-1">
<p class="text-[#111813] dark:text-white text-base font-semibold line-clamp-1">Silver Necklace</p>
<p class="text-[#61896f] dark:text-gray-400 text-sm font-normal">Qty: 1 • ฿890.00</p>
</div>
<div class="shrink-0">
<span class="material-symbols-outlined text-gray-400 hover:text-red-500 cursor-pointer">delete</span>
</div>
</div>
</div>
<!-- Add Item Button -->
<div class="px-4 py-6">
<button class="w-full flex items-center justify-center gap-2 border-2 border-dashed border-primary/40 hover:border-primary rounded-xl py-4 text-primary font-bold transition-all bg-primary/5">
<span class="material-symbols-outlined">add_circle</span>
                    Add New Item
                </button>
</div>
</section>
</main>
<!-- Fixed Bottom Summary & Action -->
<footer class="fixed bottom-0 left-0 right-0 bg-white dark:bg-[#0a150e] border-t border-gray-200 dark:border-white/10 pb-8 pt-4 px-6 z-20">
<div class="max-w-md mx-auto">
<!-- Summary Details -->
<div class="flex flex-col gap-2 mb-4">
<div class="flex justify-between items-center">
<span class="text-sm font-medium text-gray-500 dark:text-gray-400">Subtotal</span>
<span class="text-sm font-semibold">฿1,780.00</span>
</div>
<!-- VAT Toggle (iOS Style) -->
<div class="flex justify-between items-center py-1">
<div class="flex items-center gap-2">
<span class="text-sm font-medium text-[#111813] dark:text-white">Include VAT (7%)</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<div class="flex justify-between items-center">
<span class="text-sm font-medium text-gray-500 dark:text-gray-400">VAT (7%)</span>
<span class="text-sm font-semibold">฿124.60</span>
</div>
<div class="flex justify-between items-center mt-2 pt-2 border-t border-dashed border-gray-200 dark:border-white/10">
<span class="text-lg font-bold">Total Amount</span>
<span class="text-2xl font-black text-primary">฿1,904.60</span>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-[#102216] font-bold text-lg py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined">receipt_long</span>
                Generate Receipt
            </button>
</div>
</footer>
</body></html>
